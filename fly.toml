# Fly.io config for JobHunt. `fly launch` may rename the app if "jobhunt-krishojha" is taken.
app = "jobhunt-krishojha"
primary_region = "bom"   # Mumbai; change if unavailable (e.g. "sin" Singapore)

[build]

[env]
  DATA_DIR = "/data"
  ENABLE_SCHEDULER = "1"
  SCHEDULER_HOURS = "8"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # keep 1 machine up so the in-process scheduler runs
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "jobhunt_data"      # persistent volume for SQLite + uploaded resumes
  destination = "/data"
