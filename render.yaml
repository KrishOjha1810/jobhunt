# Render Blueprint. On Render: New > Blueprint > pick the jobhunt repo. It reads this file.
services:
  - type: web
    name: jobhunt
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL      # set in dashboard to your Neon Postgres URL (sync:false = secret)
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: RUN_TOKEN         # set a random string; the cron uses it
        sync: false
      - key: SECRET_KEY        # session signing key; Render auto-generates a persistent secret
        generateValue: true
      - key: DATA_DIR
        value: /tmp/jobhunt    # ephemeral is fine: DB is external (Neon), resumes not needed after parse
      - key: ENABLE_SCHEDULER
        value: "0"             # free web sleeps; external cron hits /run instead
      - key: MAX_MATCHES_PER_RUN
        value: "10"            # up to 20 best-match jobs per run (sorted best-first)
      - key: MIN_SCORE
        value: "3"
      # optional, add in dashboard if you have them:
      # - key: ADZUNA_APP_ID    {sync:false}
      # - key: ADZUNA_APP_KEY   {sync:false}
      # - key: JSEARCH_RAPIDAPI_KEY  {sync:false}
      # - key: LLM_PROVIDER     value: groq
      # - key: LLM_API_KEY      {sync:false}
      # - key: GOOGLE_CLIENT_ID      {sync:false}   # enables "Sign in with Google"
      # - key: GOOGLE_CLIENT_SECRET  {sync:false}
      # - key: SMTP_HOST {value: smtp.gmail.com}  SMTP_PORT {value:587}  SMTP_USER/SMTP_PASS {sync:false}
