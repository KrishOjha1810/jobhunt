<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobHunt, sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --accent:#6366f1; --accent2:#8b5cf6; --accent-soft:rgba(99,102,241,.14); --grad:linear-gradient(135deg,#6366f1,#8b5cf6); }
    html[data-theme="dark"] {
      --bg:#0a0a14; --bg-glow1:rgba(99,102,241,.28); --bg-glow2:rgba(139,92,246,.22);
      --card:rgba(22,23,38,.72); --card-border:rgba(255,255,255,.08); --card-shadow:0 30px 80px rgba(0,0,0,.55);
      --ink:#f1f3f9; --muted:#9499b0; --field:rgba(255,255,255,.04); --field-border:rgba(255,255,255,.1);
      --err-bg:rgba(220,38,38,.12); --err-border:rgba(248,113,113,.35); --err-ink:#fca5a5;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,-apple-system,system-ui,sans-serif; color:var(--ink); min-height:100vh;
      background:var(--bg); position:relative; overflow-x:hidden; display:flex; align-items:center; justify-content:center; padding:40px 16px; }
    body::before,body::after { content:""; position:fixed; border-radius:50%; filter:blur(90px); z-index:0; pointer-events:none; }
    body::before { width:520px; height:520px; top:-160px; left:-120px; background:var(--bg-glow1); }
    body::after { width:480px; height:480px; bottom:-180px; right:-120px; background:var(--bg-glow2); }
    .card { position:relative; z-index:1; width:100%; max-width:420px; background:var(--card); border:1px solid var(--card-border);
      border-radius:24px; box-shadow:var(--card-shadow); padding:40px 36px; backdrop-filter:blur(20px); }
    .brand { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
    .logo { width:40px; height:40px; border-radius:12px; background:var(--grad); display:flex; align-items:center; justify-content:center; font-size:20px; }
    h1 { font-size:1.5rem; margin:0; font-weight:800; letter-spacing:-.02em; }
    .sub { color:var(--muted); margin:8px 0 24px; font-size:.92rem; }
    label { display:block; margin:16px 0 6px; font-weight:600; font-size:.82rem; }
    input { width:100%; padding:12px 14px; border:1px solid var(--field-border); border-radius:12px; font-size:.97rem;
      font-family:inherit; background:var(--field); color:var(--ink); }
    input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-soft); }
    button.submit { margin-top:24px; width:100%; padding:13px; border:0; border-radius:13px; cursor:pointer; font-size:1rem;
      font-weight:700; font-family:inherit; color:#fff; background:var(--grad); box-shadow:0 12px 30px var(--accent-soft); }
    button.submit:hover { opacity:.93; }
    .err { display:none; margin-top:16px; padding:12px 14px; border-radius:12px; font-size:.88rem;
      background:var(--err-bg); border:1px solid var(--err-border); color:var(--err-ink); }
    .gbtn { display:none; margin-top:14px; width:100%; padding:12px; border:1px solid var(--field-border); border-radius:13px;
      background:#fff; color:#1f2937; font-weight:600; font-size:.95rem; text-decoration:none; text-align:center; }
    .divider { text-align:center; color:var(--muted); font-size:.78rem; margin:18px 0 0; }
    .foot { text-align:center; color:var(--muted); font-size:.85rem; margin-top:22px; }
    .foot a { color:var(--accent); text-decoration:none; font-weight:600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand"><div class="logo">🎯</div><h1>Welcome back</h1></div>
    <p class="sub">Sign in to your JobHunt tracker.</p>

    <div class="err" id="err">Invalid email or password.</div>

    <form method="POST" action="/login">
      <label>Email</label>
      <input type="email" name="email" required placeholder="you@example.com" />
      <label>Password</label>
      <input type="password" name="password" required placeholder="Your password" />
      <button class="submit" type="submit">Sign in</button>
    </form>

    <a class="gbtn" id="gbtn" href="/auth/google">Continue with Google</a>

    <p class="foot">New here? <a href="/">Create an account</a></p>
  </div>

  <script>
    if (new URLSearchParams(location.search).get('error')) document.getElementById('err').style.display = 'block';
    fetch('/authconfig').then(r => r.json()).then(d => {
      if (d.google) document.getElementById('gbtn').style.display = 'block';
    }).catch(() => {});
  </script>
</body>
</html>
