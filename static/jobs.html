<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobHunt, browse jobs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --accent:#6366f1; --accent2:#8b5cf6; --accent-soft:rgba(99,102,241,.14); --grad:linear-gradient(135deg,#6366f1,#8b5cf6); }
    html[data-theme="dark"] {
      --bg:#0a0a14; --bg-glow:rgba(99,102,241,.18); --card:rgba(22,23,38,.72); --card-border:rgba(255,255,255,.08);
      --ink:#f1f3f9; --muted:#9499b0; --field:rgba(255,255,255,.05); --field-border:rgba(255,255,255,.12);
      --seg-bg:rgba(255,255,255,.04); --seg-ink:#c2c6da; --fresh:#34d399;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,-apple-system,system-ui,sans-serif; color:var(--ink); background:var(--bg);
      padding:0 0 60px; min-height:100vh; position:relative; }
    body::before { content:""; position:fixed; top:-200px; left:50%; transform:translateX(-50%); width:900px; height:500px;
      background:var(--bg-glow); filter:blur(110px); border-radius:50%; z-index:0; pointer-events:none; }
    .wrap { max-width:1040px; margin:0 auto; padding:28px 18px; position:relative; z-index:1; }
    .cta { background:var(--grad); border-radius:18px; padding:22px 24px; margin-bottom:26px; display:flex;
      align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; box-shadow:0 16px 40px var(--accent-soft); }
    .cta h2 { margin:0 0 4px; font-size:1.15rem; color:#fff; }
    .cta p { margin:0; color:rgba(255,255,255,.85); font-size:.9rem; }
    .cta a { background:#fff; color:#4f46e5; font-weight:700; text-decoration:none; padding:11px 18px; border-radius:11px; white-space:nowrap; }
    h1 { font-size:1.5rem; margin:0 0 4px; font-weight:800; letter-spacing:-.02em; }
    .sub { color:var(--muted); margin:0 0 18px; font-size:.92rem; }
    .filters { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; align-items:center; }
    .chipbtn { padding:7px 13px; border:1px solid var(--field-border); border-radius:999px; background:var(--seg-bg);
      color:var(--seg-ink); font-size:.82rem; font-weight:600; cursor:pointer; }
    .chipbtn.active { background:var(--grad); color:#fff; border-color:transparent; }
    input.search { flex:1; min-width:160px; padding:10px 14px; border:1px solid var(--field-border); border-radius:11px;
      background:var(--field); color:var(--ink); font-size:.9rem; font-family:inherit; }
    input.search:focus { outline:none; border-color:var(--accent); }
    .job { background:var(--card); border:1px solid var(--card-border); border-radius:16px; padding:16px 18px; margin-bottom:12px;
      backdrop-filter:blur(14px); display:flex; justify-content:space-between; gap:16px; align-items:flex-start; }
    .job h3 { margin:0 0 4px; font-size:1rem; font-weight:700; }
    .meta { color:var(--muted); font-size:.84rem; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .tag { padding:2px 9px; border-radius:999px; font-size:.7rem; font-weight:600; background:var(--accent-soft); color:var(--accent2); }
    .ago { color:var(--fresh); font-weight:600; }
    .apply { background:var(--grad); color:#fff; text-decoration:none; font-weight:700; font-size:.85rem; padding:9px 16px;
      border-radius:11px; white-space:nowrap; }
    .empty { text-align:center; color:var(--muted); padding:50px; }
    @media (max-width:560px){ .job{flex-direction:column} .apply{align-self:flex-start} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="cta">
      <div>
        <h2>Get these matched to YOUR resume, on Telegram</h2>
        <p>Subscribe with your resume and we send you only the jobs that fit, twice a day.</p>
      </div>
      <a href="/">Subscribe free</a>
    </div>

    <h1>Latest jobs we found</h1>
    <p class="sub">Browse everything we have pulled in. Subscribe to get the ones matched to you.</p>

    <div class="filters" id="filters"></div>
    <input class="search" id="search" placeholder="Search title or company..." />

    <div id="list"></div>
    <div class="empty" id="empty" style="display:none;">No jobs yet, check back soon.</div>
  </div>

  <script>
    let all = [], cat = '';
    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function safeUrl(u){ u=String(u||''); return /^https?:\/\//i.test(u)?u:''; }
    function ago(iso, seen){
      const d = Date.parse(iso) || Date.parse((seen||'').replace(' ','T'));
      if(!d) return '';
      const h = Math.floor((Date.now()-d)/3.6e6);
      if(h < 1) return 'just now';
      if(h < 24) return h+'h ago';
      const days = Math.floor(h/24);
      return days+'d ago';
    }
    async function load(){
      const r = await fetch('/api/catalog'); const data = await r.json();
      all = data.jobs || [];
      const cats = data.categories || [];
      document.getElementById('filters').innerHTML =
        `<button class="chipbtn active" data-c="">All</button>` +
        cats.map(c=>`<button class="chipbtn" data-c="${esc(c)}">${esc(c)}</button>`).join('');
      document.querySelectorAll('.chipbtn').forEach(b=>b.onclick=()=>{
        cat=b.dataset.c; document.querySelectorAll('.chipbtn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active'); render();
      });
      render();
    }
    function render(){
      const q = document.getElementById('search').value.toLowerCase();
      const rows = all.filter(j =>
        (!cat || j.category===cat) &&
        (!q || (j.title||'').toLowerCase().includes(q) || (j.company||'').toLowerCase().includes(q)));
      document.getElementById('empty').style.display = rows.length?'none':'block';
      document.getElementById('list').innerHTML = rows.map(j=>{
        const a = ago(j.posted_at, j.first_seen_at);
        const u = safeUrl(j.url);
        return `<div class="job"><div>
          <h3>${esc(j.title)}</h3>
          <div class="meta">
            <span>${esc(j.company||'')}</span>
            ${j.category?`<span class="tag">${esc(j.category)}</span>`:''}
            ${j.location?`<span>${esc(j.location)}</span>`:''}
            ${a?`<span class="ago">${a}</span>`:''}
          </div></div>
          ${u?`<a class="apply" href="${esc(u)}" target="_blank" rel="noopener">Apply</a>`:''}
        </div>`;
      }).join('');
    }
    document.getElementById('search').addEventListener('input', render);
    load();
  </script>
</body>
</html>
