<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobHunt</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; }
    h1 { font-size: 1.6rem; }
    p.sub { color: #666; margin-top: -8px; }
    label { display: block; margin: 16px 0 4px; font-weight: 600; font-size: 0.9rem; }
    input[type=text], input[type=file] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
    small { color: #888; }
    button { margin-top: 24px; width: 100%; padding: 12px; background: #2563eb; color: #fff; border: 0; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .6; }
    #result { margin-top: 20px; padding: 14px; border-radius: 8px; white-space: pre-wrap; font-size: .9rem; display: none; }
    .ok { background: #ecfdf5; border: 1px solid #a7f3d0; }
    .err { background: #fef2f2; border: 1px solid #fecaca; }
  </style>
</head>
<body>
  <h1>JobHunt</h1>
  <p class="sub">Upload your resume, get matching jobs on Telegram.</p>

  <form id="form">
    <label>Your name</label>
    <input type="text" name="name" required placeholder="Krish Ojha" />

    <label>Telegram chat ID</label>
    <input type="text" name="telegram_chat_id" required placeholder="1460934377" />
    <small>Message your bot, then open api.telegram.org/bot&lt;token&gt;/getUpdates to find your chat id.</small>

    <label>Locations (comma separated)</label>
    <input type="text" name="locations" value="remote,india" />
    <small>e.g. remote, india, bangalore</small>

    <label>Extra keywords (optional, comma separated)</label>
    <input type="text" name="extra_keywords" placeholder="rust, solidity, defi" />

    <label>Resume (PDF or DOCX)</label>
    <input type="file" name="resume_file" accept=".pdf,.docx,.doc,.txt" required />

    <button type="submit">Sign up</button>
  </form>

  <div id="result"></div>

  <script>
    const form = document.getElementById('form');
    const result = document.getElementById('result');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('button');
      btn.disabled = true; btn.textContent = 'Submitting...';
      result.style.display = 'none';
      try {
        const res = await fetch('/signup', { method: 'POST', body: new FormData(form) });
        const data = await res.json();
        result.style.display = 'block';
        if (res.ok && data.ok) {
          result.className = 'ok';
          result.textContent = data.message + '\n\nDetected skills: ' + data.detected_keywords.join(', ');
        } else {
          result.className = 'err';
          result.textContent = data.error || 'Something went wrong.';
        }
      } catch (err) {
        result.style.display = 'block';
        result.className = 'err';
        result.textContent = 'Error: ' + err;
      }
      btn.disabled = false; btn.textContent = 'Sign up';
    });
  </script>
</body>
</html>
