name: tests

# Run the edge-case + regression suite on every push/PR so a broken change can't reach production.
# The suite uses an isolated SQLite DB and strips all external keys (tests/conftest.py), so it needs
# no secrets and makes no network calls.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest tests/ -q
